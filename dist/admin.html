<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Arcforge Admin</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/styles.css"></head><body><header class="top"><nav class="nav"><a class="brand" href="/">Arcforge Studio</a><div class="navlinks"><a class="btn" href="/">首页</a><a class="btn primary" href="/checkout.html">支付</a></div></nav></header><main class="panel"><div class="box"><h1>管理员界面</h1><p class="notice">这是 Pages Full Stack 版本：商品写入 D1，图片/视频上传到 R2。正式上线前可再加密码保护。</p><form id="productForm"><div class="field"><label>作品名称</label><input name="title" required placeholder="例如：Crimson Dragon Sentinel"></div><div class="row"><div class="field"><label>价格（美元）</label><input name="price" type="number" step="0.01" required placeholder="129.00"></div><div class="field"><label>高度 cm</label><input name="height_cm" type="number" step="0.1" placeholder="32"></div></div><div class="field"><label>材质</label><input name="material" placeholder="手绘树脂 / 金属旧化"></div><div class="field"><label>库存</label><input name="inventory" type="number" value="1"></div><div class="field"><label>描述</label><textarea name="description" rows="4" placeholder="作品说明"></textarea></div><button class="btn primary" type="submit">保存商品到 D1</button></form><hr><form id="uploadForm"><div class="field"><label>Artwork ID（保存商品后会自动填入）</label><input name="artwork_id" id="artworkId" placeholder="商品 ID"></div><div class="field"><label>上传 JPG/PNG/MP4 到 R2</label><input name="file" type="file" accept="image/*,video/*" required></div><button class="btn rust" type="submit">上传媒体</button></form><h2>结果</h2><pre id="output">等待操作...</pre></div></main><script>
const out=document.getElementById('output');
document.getElementById('productForm').addEventListener('submit',async e=>{e.preventDefault();const f=new FormData(e.target);const body=Object.fromEntries(f.entries());body.price=Number(body.price);body.height_cm=body.height_cm?Number(body.height_cm):null;body.inventory=body.inventory?Number(body.inventory):1;const r=await fetch('/api/products',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const d=await r.json();out.textContent=JSON.stringify(d,null,2);if(d.product?.id)document.getElementById('artworkId').value=d.product.id;});
document.getElementById('uploadForm').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);const r=await fetch('/api/upload',{method:'POST',body:fd});const d=await r.json();out.textContent=JSON.stringify(d,null,2);});
</script></body></html>
