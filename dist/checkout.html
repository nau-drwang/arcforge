<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Arcforge Checkout</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/styles.css"></head><body><header class="top"><nav class="nav"><a class="brand" href="/">Arcforge Studio</a><div class="navlinks"><a class="btn" href="/">首页</a><a class="btn" href="/admin.html">管理</a></div></nav></header><main class="panel"><div class="box"><h1>支付 / 下单</h1><p class="notice">当前版本会把订单保存到 D1，真实收款可在后续接 Stripe Payment Link 或 PayPal。</p><form id="orderForm"><div class="field"><label>作品 ID</label><input name="artwork_id" id="artworkId" required></div><div class="field"><label>作品名称</label><input id="title" disabled></div><div class="field"><label>姓名</label><input name="buyer_name" required></div><div class="field"><label>Email</label><input name="buyer_email" type="email" required></div><button class="btn primary" type="submit">创建订单</button></form><pre id="output">等待下单...</pre></div></main><script>
const qs=new URLSearchParams(location.search);artworkId.value=qs.get('artwork')||'';title.value=qs.get('title')||'';
document.getElementById('orderForm').addEventListener('submit',async e=>{e.preventDefault();const body=Object.fromEntries(new FormData(e.target).entries());const r=await fetch('/api/orders',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const d=await r.json();output.textContent=JSON.stringify(d,null,2);});
</script></body></html>
