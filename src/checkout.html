<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ArcForge Inquiry</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/styles.css"></head><body><header class="top"><nav class="nav"><a class="brand" href="/">ArcForge Studio</a><div class="navlinks"><a class="btn" href="/">Home</a><a class="btn" href="/admin.html">Admin</a></div></nav></header><main class="panel"><div class="box"><h1>Artwork Inquiry</h1><p class="notice">This page stores inquiry/order records in D1. Stripe Payment Links or PayPal can be connected later for real checkout.</p><form id="orderForm"><div class="field"><label>Artwork ID</label><input name="artwork_id" id="artworkId" required></div><div class="field"><label>Artwork title</label><input id="title" disabled></div><div class="field"><label>Your name</label><input name="buyer_name" required></div><div class="field"><label>Email</label><input name="buyer_email" type="email" required></div><button class="btn primary" type="submit">Submit inquiry</button></form><pre id="output">Waiting for inquiry...</pre></div></main><script>
const qs=new URLSearchParams(location.search);artworkId.value=qs.get('artwork')||'';title.value=qs.get('title')||'';
document.getElementById('orderForm').addEventListener('submit',async e=>{e.preventDefault();const body=Object.fromEntries(new FormData(e.target).entries());const r=await fetch('/api/orders',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const d=await r.json();output.textContent=JSON.stringify(d,null,2);});
</script></body></html>
