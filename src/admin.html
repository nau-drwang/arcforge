<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ArcForge Admin</title><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/styles.css"></head><body><header class="top"><nav class="nav"><a class="brand" href="/">ArcForge Studio</a><div class="navlinks"><a class="btn" href="/">Home</a><a class="btn primary" href="/checkout.html">Inquiry</a></div></nav></header><main class="panel"><div class="box"><h1>Artwork Admin</h1><p class="notice">Data-driven ArcForge version: artwork records are written to D1, while future uploaded images/videos are stored in R2. The first real-photo collection is also available as a static seed at <code>/data/artworks.json</code>.</p><form id="productForm"><div class="field"><label>Artwork title</label><input name="title" required placeholder="Example: Crimson Dragon Sentinel"></div><div class="row"><div class="field"><label>Price in USD, or 0 for inquiry</label><input name="price" type="number" step="0.01" value="0"></div><div class="field"><label>Height cm</label><input name="height_cm" type="number" step="0.1" placeholder="32"></div></div><div class="field"><label>Material</label><input name="material" placeholder="Hand-painted resin / metallic weathering"></div><div class="field"><label>Inventory</label><input name="inventory" type="number" value="1"></div><div class="field"><label>Description</label><textarea name="description" rows="4" placeholder="Collector-facing English description"></textarea></div><button class="btn primary" type="submit">Save artwork to D1</button></form><hr><form id="uploadForm"><div class="field"><label>Artwork ID, filled automatically after saving</label><input name="artwork_id" id="artworkId" placeholder="Artwork ID"></div><div class="field"><label>Upload JPG/PNG/MP4 to R2</label><input name="file" type="file" accept="image/*,video/*" required></div><button class="btn rust" type="submit">Upload media</button></form><h2>Result</h2><pre id="output">Waiting for action...</pre></div></main><script>
const out=document.getElementById('output');
document.getElementById('productForm').addEventListener('submit',async e=>{e.preventDefault();const f=new FormData(e.target);const body=Object.fromEntries(f.entries());body.price=Number(body.price||0);body.height_cm=body.height_cm?Number(body.height_cm):null;body.inventory=body.inventory?Number(body.inventory):1;const r=await fetch('/api/products',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});const d=await r.json();out.textContent=JSON.stringify(d,null,2);if(d.product?.id)document.getElementById('artworkId').value=d.product.id;});
document.getElementById('uploadForm').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);const r=await fetch('/api/upload',{method:'POST',body:fd});const d=await r.json();out.textContent=JSON.stringify(d,null,2);});
</script></body></html>
